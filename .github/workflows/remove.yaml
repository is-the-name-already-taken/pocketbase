name: Remove Deployment

on:
  workflow_dispatch:

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Remove App from Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 64280
          script: |
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"
            export DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus"

            REPO_NAME="${{ github.event.repository.name }}"

            APP_DIR="$HOME/app/${REPO_NAME}"

            if [ -d "$APP_DIR" ]; then
                echo "🚀 Removing service and app files..."
                cd "$APP_DIR"

                if [ -f "./pocketbase" ]; then
                    sudo ./pocketbase service stop || true
                    sudo ./pocketbase service uninstall || true
                    echo "✅ Service uninstalled."
                fi

                cd $HOME
                rm -rf "$APP_DIR"
                echo "✅ App directory ($APP_DIR) removed."
            else
                echo "⚠️ App directory not found. Nothing to remove."
            fi